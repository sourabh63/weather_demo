<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Weather Agent</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <div class="header-info">
                <h1><i class="fa-solid fa-cloud-sun"></i> Weather Agent</h1>
                <p>Powered by DeepSeek AI</p>
            </div>
        </header>

        <div class="chat-box" id="chat-box">
            <div class="message ai-message">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="content">Hello! I'm your AI Weather Agent. Ask me about the weather anywhere!</div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="e.g. What's the weather in Tokyo?" autocomplete="off">
            <button id="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
